<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; font-family: monospace; }
    #game-canvas { display: block; width: 100%; height: 100%; }
    #status {
      position: fixed; top: 8px; right: 8px;
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; background: rgba(10,10,10,0.85);
      backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; z-index: 1000; font-size: 10px;
      color: rgba(255,255,255,0.5); user-select: none;
    }
    #status-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #555;
      transition: background 0.3s;
    }
    #status-dot.connected { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.5); }
    #status-dot.loading { background: #f59e0b; box-shadow: 0 0 6px rgba(245,158,11,0.5); animation: pulse 1s infinite; }
    #status-dot.error { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.5); }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  </style>
</head>
<body>
  <div id="status">
    <span id="status-dot"></span>
    <span id="status-text">Connecting...</span>
  </div>
  <canvas id="game-canvas"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- Game runtime: input, time, canvas -->
  <script>
    (function() {
      var gameCanvas = document.getElementById('game-canvas');

      window.GAME = {
        inputs: { keys: {}, justPressed: {}, justReleased: {} },
        mouse: { x: 0, y: 0, normX: 0, normY: 0, buttons: 0, justDown: false, justUp: false },
        time: { delta: 0, elapsed: 0, frame: 0, _last: 0 },
        canvas: gameCanvas,
        _activeFrames: new Set(),

        tick: function() {
          var inp = window.GAME.inputs;
          for (var k in inp.justPressed) delete inp.justPressed[k];
          for (var k in inp.justReleased) delete inp.justReleased[k];
          window.GAME.mouse.justDown = false;
          window.GAME.mouse.justUp = false;
          var now = performance.now();
          var t = window.GAME.time;
          if (t._last === 0) t._last = now;
          t.delta = Math.min((now - t._last) / 1000, 0.1);
          t._last = now;
          t.elapsed += t.delta;
          t.frame++;
        },

        stopLoop: function() {
          window.GAME._activeFrames.forEach(function(id) { _originalCAF.call(window, id); });
          window.GAME._activeFrames.clear();
        },

        isKeyDown: function(key) { return !!window.GAME.inputs.keys[key]; },
        isKeyJustPressed: function(key) { return !!window.GAME.inputs.justPressed[key]; },
        isKeyJustReleased: function(key) { return !!window.GAME.inputs.justReleased[key]; },
      };

      // --- Keyboard listeners ---
      document.addEventListener('keydown', function(e) {
        var key = e.code;
        if (!window.GAME.inputs.keys[key]) window.GAME.inputs.justPressed[key] = true;
        window.GAME.inputs.keys[key] = true;
        if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.code) !== -1) e.preventDefault();
      });
      document.addEventListener('keyup', function(e) {
        delete window.GAME.inputs.keys[e.code];
        window.GAME.inputs.justReleased[e.code] = true;
      });
      window.addEventListener('blur', function() {
        var keys = window.GAME.inputs.keys;
        for (var k in keys) { window.GAME.inputs.justReleased[k] = true; delete keys[k]; }
      });

      // --- Mouse listeners ---
      gameCanvas.addEventListener('mousemove', function(e) {
        var rect = gameCanvas.getBoundingClientRect();
        window.GAME.mouse.x = e.clientX - rect.left;
        window.GAME.mouse.y = e.clientY - rect.top;
        window.GAME.mouse.normX = (window.GAME.mouse.x / rect.width) * 2 - 1;
        window.GAME.mouse.normY = -(window.GAME.mouse.y / rect.height) * 2 + 1;
      });
      gameCanvas.addEventListener('mousedown', function(e) {
        window.GAME.mouse.buttons = e.buttons;
        window.GAME.mouse.justDown = true;
      });
      gameCanvas.addEventListener('mouseup', function(e) {
        window.GAME.mouse.buttons = e.buttons;
        window.GAME.mouse.justUp = true;
      });
      gameCanvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });

      // --- Monkey-patch requestAnimationFrame for loop tracking ---
      var _originalRAF = window.requestAnimationFrame;
      var _originalCAF = window.cancelAnimationFrame;

      window.requestAnimationFrame = function(callback) {
        var id = _originalRAF.call(window, function(timestamp) {
          window.GAME._activeFrames.delete(id);
          callback(timestamp);
        });
        window.GAME._activeFrames.add(id);
        return id;
      };

      window.cancelAnimationFrame = function(id) {
        window.GAME._activeFrames.delete(id);
        _originalCAF.call(window, id);
      };
    })();
  </script>

  <script>
    // Read config from URL params
    const params = new URLSearchParams(window.location.search);
    const SUPABASE_URL = params.get('supabaseUrl') || '';
    const SUPABASE_ANON_KEY = params.get('supabaseKey') || '';
    const GAME_NAME = params.get('game') || 'my-game';
    const GAME_ID = params.get('gameId') || '';
    const REQUESTED_FORMAT = params.get('format') || '';
    const STORAGE_BASE = `${SUPABASE_URL}/storage/v1/object/public/bundles/${GAME_NAME}`;
    const MANIFEST_URL = `${STORAGE_BASE}/manifest.json`;
    const BUNDLE_URL = `${STORAGE_BASE}/latest.js`;

    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');

    function setStatus(state, message) {
      statusDot.className = state;
      statusText.textContent = message;
    }

    const loadedExternals = new Set();
    const externalScripts = [];
    const externalObjectUrls = [];
    let importMapInjected = false;
    let currentExternalSignature = null;

    function uniqueValues(values) {
      return Array.from(new Set(values.filter(Boolean)));
    }

    function normalizeExternal(ext) {
      const normalized = {
        ...ext,
        load_type: ext.load_type === 'module' ? 'module' : 'script',
        module_imports: ext.module_imports || null,
        fallback_urls: [],
      };

      if (normalized.name === 'pathfinding_js') {
        const preferredUrl = 'https://cdn.jsdelivr.net/npm/pathfinding@0.4.18/visual/lib/pathfinding-browser.min.js';
        normalized.fallback_urls = uniqueValues([
          normalized.cdn_url,
          preferredUrl,
          'https://unpkg.com/pathfinding@0.4.18/visual/lib/pathfinding-browser.min.js',
        ]).filter((url) => url !== preferredUrl);
        normalized.cdn_url = preferredUrl;
      }

      if (normalized.name === 'three_js') {
        const preferredUrl = 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
        normalized.fallback_urls = uniqueValues([
          normalized.cdn_url,
          preferredUrl,
          'https://unpkg.com/three@0.160.0/build/three.module.js',
        ]).filter((url) => url !== preferredUrl);
        normalized.cdn_url = preferredUrl;
        normalized.load_type = 'module';
      }

      return normalized;
    }

    function normalizeManifestExternals(manifestExternals) {
      if (!Array.isArray(manifestExternals)) return [];
      return manifestExternals.map(normalizeExternal);
    }

    function getExternalSignature(manifestExternals) {
      return JSON.stringify(
        manifestExternals
          .map((ext) => ({
            name: ext.name,
            cdn_url: ext.cdn_url,
            global_name: ext.global_name,
            load_type: ext.load_type,
            module_imports: ext.module_imports || null,
          }))
          .sort((left, right) => left.name.localeCompare(right.name)),
      );
    }

    function createExternalLookup(manifestExternals) {
      const byName = new Map();
      const byGlobalName = new Map();
      for (const ext of manifestExternals) {
        byName.set(ext.name, ext);
        if (ext.global_name && !byGlobalName.has(ext.global_name)) {
          byGlobalName.set(ext.global_name, ext);
        }
      }
      return { byName, byGlobalName };
    }

    function createGlobalShimUrl(globalName) {
      const obj = window[globalName];
      if (!obj) return null;
      const keys = Object.keys(obj).filter(k => /^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(k));
      const lines = [`const _G = window.${globalName};`, ...keys.map(k => `export const ${k} = _G.${k};`), `export default _G;`];
      const shimUrl = URL.createObjectURL(new Blob([lines.join('\n')], { type: 'application/javascript' }));
      externalObjectUrls.push(shimUrl);
      return shimUrl;
    }

    function resolveImportTarget(specifier, globalName, lookup) {
      if (specifier === 'three') {
        const threeExternal = lookup.byName.get('three_js');
        if (threeExternal && threeExternal.load_type === 'module') {
          return threeExternal.cdn_url;
        }
      }

      const sourceExternal = lookup.byGlobalName.get(globalName);
      if (sourceExternal && sourceExternal.load_type === 'module') {
        return sourceExternal.cdn_url;
      }

      return createGlobalShimUrl(globalName);
    }

    async function loadWithFallbacks(ext, loader) {
      const candidates = uniqueValues([ext.cdn_url, ...(ext.fallback_urls || [])]);

      for (const url of candidates) {
        try {
          return await loader(url);
        } catch (error) {
          console.warn(`Failed candidate for ${ext.name}:`, url, error);
        }
      }

      throw new Error(`Failed to load: ${ext.name}`);
    }

    function loadExternalScript(ext) {
      if (loadedExternals.has(ext.name)) return Promise.resolve();

      return loadWithFallbacks(ext, (url) =>
        new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = url;
          script.onload = () => {
            externalScripts.push(script);
            resolve();
          };
          script.onerror = () => {
            script.remove();
            reject(new Error(`Failed to load script: ${url}`));
          };
          document.head.appendChild(script);
        }),
      ).then(() => {
        loadedExternals.add(ext.name);
      });
    }

    async function loadExternalModule(ext) {
      if (loadedExternals.has(ext.name)) return;

      const mod = await loadWithFallbacks(ext, (url) => import(url));
      const target = window[ext.global_name] || {};
      for (const [key, value] of Object.entries(mod)) {
        if (key !== 'default') target[key] = value;
      }
      window[ext.global_name] = target;
      loadedExternals.add(ext.name);
    }

    async function loadExternals(manifestExternals) {
      if (!manifestExternals || manifestExternals.length === 0) return;
      const scriptExts = manifestExternals.filter(e => e.load_type !== 'module');
      const moduleExts = manifestExternals
        .filter(e => e.load_type === 'module')
        .sort((left, right) => {
          if (left.name === 'three_js') return -1;
          if (right.name === 'three_js') return 1;
          return left.name.localeCompare(right.name);
        });

      await Promise.all(scriptExts.map(loadExternalScript));

      if (moduleExts.length > 0 && !importMapInjected) {
        const imports = {};
        const lookup = createExternalLookup(manifestExternals);
        for (const ext of moduleExts) {
          if (ext.module_imports) {
            for (const [specifier, globalName] of Object.entries(ext.module_imports)) {
              if (!imports[specifier]) {
                const importTarget = resolveImportTarget(specifier, globalName, lookup);
                if (importTarget) imports[specifier] = importTarget;
              }
            }
          }
        }
        if (Object.keys(imports).length > 0) {
          const mapScript = document.createElement('script');
          mapScript.type = 'importmap';
          mapScript.textContent = JSON.stringify({ imports });
          document.head.appendChild(mapScript);
          externalScripts.push(mapScript);
          importMapInjected = true;
        }
      }
      for (const ext of moduleExts) await loadExternalModule(ext);
    }

    function clearExternals() {
      for (const s of externalScripts) s.remove();
      externalScripts.length = 0;
      for (const url of externalObjectUrls) URL.revokeObjectURL(url);
      externalObjectUrls.length = 0;
      loadedExternals.clear();
      importMapInjected = false;
      currentExternalSignature = null;
    }

    let currentScript = null;

    function resolveRuntime(manifest) {
      if (manifest && (manifest.runtime === 'phaser' || manifest.runtime === 'three')) {
        return manifest.runtime;
      }
      return REQUESTED_FORMAT === '2d' ? 'phaser' : 'three';
    }

    function getRuntimeLabel(runtime) {
      return runtime === 'phaser' ? 'Phaser' : 'Three.js';
    }

    function destroyExistingRuntime() {
      if (window.__PHASER_GAME__ && typeof window.__PHASER_GAME__.destroy === 'function') {
        try {
          window.__PHASER_GAME__.destroy(true);
        } catch (error) {
          console.warn('Failed to destroy Phaser runtime:', error);
        }
      }
      window.__PHASER_GAME__ = null;
    }

    async function loadBundle() {
      setStatus('loading', 'Loading bundle...');
      // Clean up previous bundle's animation loops and per-frame state
      window.GAME.stopLoop();
      window.GAME.time._last = 0;
      window.GAME.time.frame = 0;
      window.GAME.time.elapsed = 0;
      window.GAME.time.delta = 0;
      for (var k in window.GAME.inputs.justPressed) delete window.GAME.inputs.justPressed[k];
      for (var k in window.GAME.inputs.justReleased) delete window.GAME.inputs.justReleased[k];
      window.GAME.mouse.justDown = false;
      window.GAME.mouse.justUp = false;
      destroyExistingRuntime();
      if (currentScript) { currentScript.remove(); currentScript = null; }
      try {
        const manifestRes = await fetch(`${MANIFEST_URL}?t=${Date.now()}`);
        let manifest = null;
        if (manifestRes.ok) manifest = await manifestRes.json();
        const manifestExternals = normalizeManifestExternals(manifest && manifest.externals);
        const nextExternalSignature = getExternalSignature(manifestExternals);
        const runtime = resolveRuntime(manifest);
        const runtimeLabel = getRuntimeLabel(runtime);
        window.GAME.runtime = runtime;
        window.GAME.format = runtime === 'phaser' ? '2d' : '3d';
        setStatus('loading', `Loading ${runtimeLabel} bundle...`);

        if (currentExternalSignature && currentExternalSignature !== nextExternalSignature) {
          setStatus('loading', `${runtimeLabel} runtime changed. Refreshing...`);
          window.location.reload();
          return;
        }

        if (currentExternalSignature == null) {
          clearExternals();
          await loadExternals(manifestExternals);
          currentExternalSignature = nextExternalSignature;
        }

        const response = await fetch(`${BUNDLE_URL}?t=${Date.now()}`);
        if (!response.ok) {
          if (response.status === 404 || response.status === 400) { setStatus('connected', `No ${runtimeLabel} build yet. Create some atoms!`); return; }
          throw new Error(`HTTP ${response.status}`);
        }
        const code = await response.text();
        if (!code || code.trim().length === 0) { setStatus('connected', `Empty ${runtimeLabel} bundle. Create some atoms!`); return; }
        currentScript = document.createElement('script');
        currentScript.textContent = code;
        document.body.appendChild(currentScript);
        const extCount = manifestExternals.length;
        setStatus('connected', `${runtimeLabel} live (${extCount} ext, ${new Date().toLocaleTimeString()})`);
      } catch (err) {
        console.error('Failed to load bundle:', err);
        setStatus('error', `Load failed: ${err.message}`);
      }
    }

    function setupRealtime() {
      if (!SUPABASE_URL) { setStatus('error', 'No Supabase URL'); return; }
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const realtimeChannel = supabase.channel(`builds:${GAME_ID || GAME_NAME}`);
      const realtimeFilter = {
        event: 'UPDATE',
        schema: 'public',
        table: 'builds',
        ...(GAME_ID ? { filter: `game_id=eq.${GAME_ID}` } : {}),
      };

      realtimeChannel
        .on('postgres_changes', realtimeFilter, (payload) => {
          const previousStatus = payload.old && payload.old.status;
          const nextStatus = payload.new && payload.new.status;
          if (GAME_ID && payload.new && payload.new.game_id !== GAME_ID) return;
          if (nextStatus === 'success' && previousStatus !== 'success') {
            loadBundle();
          }
        })
        .subscribe((status) => {
          if (status === 'SUBSCRIBED') setStatus('connected', 'Watching for builds...');
        });
    }

    setupRealtime();
    loadBundle();
  </script>
</body>
</html>
